acquisition:
  metadata:
    driver: voxel.metadata.metadata_class
    module: MetadataClass
    init:
      metadata_dictionary:
        instrument_type: exaspim
        subject_id: 123456
        experimenter_name: adam glaser
        immersion_medium: 0.05X SSC
        immersion_medium_refractive_index: 1.33
        x_anatomical_direction: Anterior_to_posterior
        y_anatomical_direction: Inferior_to_superior
        z_anatomical_direction: Left_to_right
      date_format: Year/Month/Day/Hour/Minute/Second
      name_specs:
        deliminator: _
        format: [ instrument_type, subject_id ]
  operations:
    vp-151mx:
      acquire:
        type: writer
        driver: voxel.writers.acquire_zarr
        module: AcquireZarrWriter
        init:
          path: D:\\local_test
        settings:
          compression: zstdshuffle
          chunk_size_x_px: 128
          chunk_size_y_px: 128
          chunk_size_z_px: 32
          shard_size_x_chunks: 111
          shard_size_y_chunks: 84
          shard_size_z_chunks: 1
      robocopy:
        type: transfer
        driver: voxel.file_transfers.robocopy
        module: RobocopyFileTransfer
        init:
          external_path: D:\\external_test
          local_path: D:\\local_test
        settings:
          verify_transfer: True
          max_retry: 3
          timeout_s: 60
  tiles:
    - tile_number: 0
      position_mm:
        x: 0
        y: 0
        z: 0
      step_size: 1.000
      vp-151mx:
        binning: 1
      prefix: tile
      steps: 14336
      channel: '488'
      power_mw: 1000
    - tile_number: 1
      position_mm:
        x: 1
        y: 1
        z: 1
      step_size: 1.000
      vp-151mx:
        binning: 1
      prefix: tile
      steps: 14336
      channel: '488'
      power_mw: 1000
