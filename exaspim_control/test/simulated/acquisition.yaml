acquisition:
  metadata:
    driver: voxel.metadata.metadata_class
    module: MetadataClass
    init:
      metadata_dictionary:
        instrument_type: exaspim
        subject_id: 123456
        experimenter_name: adam glaser
        immersion_medium: 0.05X SSC
        immersion_medium_refractive_index: 1.33
        x_anatomical_direction: Anterior_to_posterior
        y_anatomical_direction: Inferior_to_superior
        z_anatomical_direction: Left_to_right
      date_format: Year/Month/Day/Hour/Minute/Second
      name_specs:
        deliminator: _
        format: [ instrument_type, subject_id ]
  operations:
    vp-151mx:
      imaris:
        type: writer
        driver: voxel.writers.imaris
        module: ImarisWriter
        init:
          path: D:\\
        properties:
          compression: lz4shuffle
          data_type: uint16
      robocopy:
        type: transfer
        driver: voxel.file_transfers.robocopy
        module: RobocopyFileTransfer
        init:
          external_path: D:\\external
          local_path: D:\\
        properties:
          verify_transfer: True
          max_retry: 3
          timeout_s: 60
      # max_projection:
      #   type: process
      #   driver: voxel.processes.max_projection.cpu
      #   module: CPUMaxProjection
      #   init:
      #     path: D:\\
      #   properties:
      #     data_type: uint16
      #     z_projection_count_px: 2048
      # background_collection:
      #   type: routine
      #   driver: voxel.routines.background_collection
      #   module: BackgroundCollection
      #   init:
      #     path: D:\\
      #   properties:
      #     data_type: uint16
      #     frame_count_px: 10
  tiles:
    - tile_number: 0
      position_mm:
        x: 0
        y: 0
        z: 0
      step_size: 1.000
      prefix: tile
      steps: 8192
      channel: '488'
      power_mw: 1000
      vp-151mx:
        binning: 1
    - tile_number: 1
      position_mm:
        x: 0
        y: 0
        z: 0
      step_size: 1.000
      prefix: tile
      steps: 8192
      channel: '488'
      power_mw: 1000
      vp-151mx:
        binning: 1
